{% extends "base.html" %}

{% block title %}Reģistrācija - Skolas Inventārs{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 80px auto; text-align: center;">
    <div class="card">
        <i data-lucide="user-plus" style="color: var(--primary); width: 48px; height: 48px; margin-bottom: 1rem;"></i>
        
        <h2>Izveidot kontu</h2>
        <p style="color: var(--secondary); font-size: 0.9rem; margin-bottom: 1.5rem;">
            Reģistrējies, lai piekļūtu skolas inventāram
        </p>

        <form action="/registreties" method="POST" style="text-align: left;">
            <div style="margin-bottom: 1rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Lietotājvārds</label>
                <input type="text" name="lietotajs" 
                       placeholder="Ievadi vārdu..." 
                       style="width: 100%; padding: 0.75rem; border: 1px solid #CBD5E1; border-radius: 8px; font-family: inherit;" 
                       required>
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Parole</label>
                <input type="password" name="parole" 
                       placeholder="Izveido drošu paroli..." 
                       style="width: 100%; padding: 0.75rem; border: 1px solid #CBD5E1; border-radius: 8px; font-family: inherit;" 
                       required>
            </div>

            <button type="submit" class="btn" style="width: 100%; justify-content: center; padding: 0.8rem;">
                Reģistrēties
            </button>
        </form>

        <div style="margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid #F1F5F9;">
            <p style="font-size: 0.9rem;">
                Esi jau reģistrējies? 
                <a href="/pieteiksanas" style="color: var(--primary); font-weight: 600; text-decoration: none;">Autorizēties</a>
            </p>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();
</script>
{% endblock %}
