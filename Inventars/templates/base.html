<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Skolas Inventārs{% endblock %}</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --primary: #2563EB;     /* Galvenā krāsa */
            --secondary: #64748B;   /* Akcenta krāsa */
            --title: #1E293B;       /* Virsrakstu krāsa */
            --text: #475569;        /* Pamatteksta krāsa */
            --bg: #F8FAFC;          /* Fona krāsa */
            --white: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', sans-serif; /* Pamatteksta fonts */
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        h1, h2, h3, .nav-logo {
            font-family: 'Inter', sans-serif; /* Virsrakstu fonts */
            color: var(--title);
            font-weight: 700;
        }

        /* Navigācijas josla */
        nav {
            background-color: var(--white);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-logo {
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--secondary);
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        /* Galvenais satura konteiners */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* Pogas stils */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background-color: var(--primary);
            color: var(--white);
            padding: 0.6rem 1.2rem;
            border-radius: 8px; /* Noapaļoti stūri modernam vibe */
            text-decoration: none;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        /* Kartiņu stils (inventāram) */
        .card {
            background: var(--white);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="nav-logo">
            <i data-lucide="package"></i>
            Inventārs
        </a>
        <ul class="nav-links">
            {% if session.get('lietotajs_id') %} <li><a href="/inventars">Inventārs</a></li>
                {% if session.get('loma') == 'admin' %}
                    <li><a href="/pievienot">Pievienot</a></li>
                {% endif %}
                <li><a href="/atslegties">Atslēgties ({{ session.get('lietotajvards') }})</a></li>
        {% else %}
            <li><a href="/registreties">Reģistrēties</a></li>
            <li><a href="/pieteiksanas">Autorizēties</a></li>
    {% endif %}
</ul>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script>
    </script>
</body>
</html>
