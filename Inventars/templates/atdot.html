{% extends "base.html" %}
{% block content %}
<h1>Atdot inventāru</h1>

<div class="card" style="margin-top: 2rem;">
    {% if saraksts %}
    <table style="width: 100%; border-collapse: collapse;">
        <thead>
            <tr style="border-bottom: 2px solid var(--bg); text-align: left;">
                <th style="padding: 1rem;">Nosaukums</th>
                <th style="padding: 1rem;">Saņemšanas datums</th>
                <th style="padding: 1rem;">Darbība</th>
            </tr>
        </thead>
        <tbody>
            {% for i in saraksts %}
            <tr style="border-bottom: 1px solid var(--bg);">
                <td style="padding: 1rem;">{{ i['nosaukums'] }}</td>
                <td style="padding: 1rem;">{{ i['datums_izsniegts'] }}</td>
                <td style="padding: 1rem;">
                    <a href="{{ url_for('izpildit_atdosanu', ieraksta_id=i['ID']) }}" 
                        class="btn" style="background-color: #EF4444;">Atdot</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
    <p style="padding: 1rem; color: var(--secondary);">Tev pašlaik nav neviena rezervēta priekšmeta.</p>
    {% endif %}
</div>
{% endblock %}
